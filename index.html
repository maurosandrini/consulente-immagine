<script type="module">
/* =============================================================
   STATE SHAPE (vedi architettura-v0.4.md)
   NAV: setup → photo → analyzing → interview → generating_prompts
        → adversarial → correcting → generating → restoring → results
   ============================================================= */

/* =============================================================
   COST TABLE
   ============================================================= */
const COST_TABLE = {
  'gemini-2.5-flash': 0.1,
  'gemini-2.5-pro': 0.5,
  'gemini-2.5-flash-image': 3,
  'gemini-2.5-flash-image-preview': 3,
  'claude-haiku-4-5-20251001': 0.3,
  'claude-opus-4-7': 2.5
};

const FALLBACK_RECIPE = `# RECIPE fallback v0.4
Output: 2-3 look completi (capelli+trucco+rossetto+orecchini+occhiali+palette abiti+metallo gioielli). Preserva SEMPRE il volto con face restoration canvas. Intervista: 3 domande + nota libera + opzione occhiali. Cromoterapia Jackson 4-stagioni. Checklist avversariale V1-V8.`;

const SEASONS = {
  Spring: { it: 'Primavera', palette: ['#FF7F50','#FFDAB9','#FFD700','#40E0D0','#7CFC00','#FFA07A','#FFB6C1','#F0E68C'], avoid: ['#2F4F4F','#000000','#8B4513'], metal: 'oro giallo', lip: ['corallo','peach','warm pink'] },
  Summer: { it: 'Estate', palette: ['#F8BBD0','#B3C5D7','#E6E6FA','#D3D3D3','#F5F5DC','#DDA0DD','#B0C4DE','#F0F8FF'], avoid: ['#FF4500','#8B4513','#FFD700'], metal: 'argento', lip: ['rosy pink','mauve soft','berry cool'] },
  Autumn: { it: 'Autunno', palette: ['#E2725B','#CC7722','#556B2F','#B7410E','#CD7F32','#8B4513','#A0522D','#DAA520'], avoid: ['#FFC0CB','#87CEEB','#FFFFFF'], metal: 'oro vecchio', lip: ['brick','terracotta','warm nude'] },
  Winter: { it: 'Inverno', palette: ['#FFFFFF','#000000','#DC143C','#0047AB','#50C878','#FF1493','#191970','#C0C0C0'], avoid: ['#FFDAB9','#F0E68C','#E2725B'], metal: 'argento', lip: ['true red','fuchsia','plum'] }
};

/* =============================================================
   MIGRATION v0.3 → v0.4
   ============================================================= */
(function migrate() {
  for (const key of ['gemini_key','anthropic_key','user_name','mode']) {
    if (!localStorage.getItem(`ci4_${key}`) && localStorage.getItem(`ci3_${key}`))
      localStorage.setItem(`ci4_${key}`, localStorage.getItem(`ci3_${key}`));
  }
})();

/* =============================================================
   STATE
   ============================================================= */
const state = {
  step: 'setup',
  keys: {
    gemini: localStorage.getItem('ci4_gemini_key') || '',
    anthropic: localStorage.getItem('ci4_anthropic_key') || ''
  },
  userName: localStorage.getItem('ci4_user_name') || '',
  mode: localStorage.getItem('ci4_mode') || 'fast',
  recipe: null,
  photo: { base64: null, dataUrl: null, mime: 'image/jpeg', imgElement: null },
  faceAnalysis: null,
  faceBboxOriginal: null, // da MediaPipe
  chromotherapy: null,
  preferences: { occasione: '', aggettivi: '', vincoli_no: '', nota_libera: '', glasses: 'forse' },
  imagePrompts: null,
  verdicts: null,
  intro: '',
  correctionIterations: {},
  MAX_CORRECTION_ITER: 2,
  generatedRaw: {}, // indice → dataUrl (versione raw Nano Banana)
  generatedImages: {}, // indice → dataUrl (versione face-restored) o {error}
  showRaw: {}, // indice → bool (mostra raw invece di restored)
  errorLog: JSON.parse(localStorage.getItem('ci4_error_log') || '[]'),
  isLoading: false,
  loadingMessage: '',
  error: null,
  sessionCostCents: 0,
  preflight: { anthropic: 'unknown' },
  editPromptIndex: null,
  faceDetector: null
};

const setState = (patch) => { Object.assign(state, patch); render(); };

/* =============================================================
   UTIL
   ============================================================= */
const el = (tag, attrs = {}, children = []) => {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') node.className = v;
    else if (k === 'html') node.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'text') node.textContent = v;
    else if (k === 'style') node.style.cssText = v;
    else node.setAttribute(k, v);
  }
  for (const c of [].concat(children)) if (c) node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  return node;
};

const loadImg = (src) => new Promise((res, rej) => {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => res(img);
  img.onerror = rej;
  img.src = src;
});

const compressImage = (file, maxSide = 1280, quality = 0.88) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataUrl = c.toDataURL('image/jpeg', quality);
      resolve({ dataUrl, base64: dataUrl.split(',')[1], mime: 'image/jpeg' });
    };
    img.onerror = reject;
    img.src = reader.result;
  };
  reader.onerror = reject;
  reader.readAsDataURL(file);
});

const extractJson = (text) => {
  if (!text) return null;
  const stripped = text.replace(/```(?:json)?\s*|\s*```/g, '').trim();
  try { return JSON.parse(stripped); } catch {}
  const match = stripped.match(/\{[\s\S]*\}/);
  if (match) { try { return JSON.parse(match[0]); } catch {} }
  return null;
};

function logError(stage, severity, message, context = {}, recovered = false) {
  const entry = { ts: new Date().toISOString(), stage, severity, message, context, recovered };
  state.errorLog.push(entry);
  try { localStorage.setItem('ci4_error_log', JSON.stringify(state.errorLog.slice(-200))); } catch {}
  console[severity === 'error' ? 'error' : 'log']('[ci4]', entry);
}

function trackCost(model) { state.sessionCostCents += COST_TABLE[model] ?? 0.3; renderFooter(); }

function clearErrorLog() {
  if (!confirm('Svuotare il log errori?')) return;
  state.errorLog = [];
  localStorage.setItem('ci4_error_log', '[]');
  renderFooter(); render();
}

/* =============================================================
   MediaPipe Face Detector (lazy load)
   ============================================================= */
async function initFaceDetector() {
  if (state.faceDetector) return state.faceDetector;
  try {
    const { FaceDetector, FilesetResolver } = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs');
    const vision = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm');
    state.faceDetector = await FaceDetector.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite'
      },
      runningMode: 'IMAGE'
    });
    logError('mediapipe', 'info', 'Face detector caricato', {});
    return state.faceDetector;
  } catch (e) {
    logError('mediapipe', 'warn', `MediaPipe load fallito: ${e.message}`, {}, true);
    return null;
  }
}

async function detectFace(imgElement) {
  const detector = await initFaceDetector();
  if (!detector) return null;
  try {
    const result = detector.detect(imgElement);
    if (!result.detections || !result.detections.length) return null;
    const box = result.detections[0].boundingBox;
    return { x: box.originX, y: box.originY, width: box.width, height: box.height };
  } catch (e) {
    logError('mediapipe', 'warn', `Detect fallito: ${e.message}`, {}, true);
    return null;
  }
}

/* =============================================================
   FACE RESTORATION
   ============================================================= */
async function faceRestore(origDataUrl, genDataUrl) {
  try {
    const [orig, gen] = await Promise.all([loadImg(origDataUrl), loadImg(genDataUrl)]);
    const [origFace, genFace] = await Promise.all([detectFace(orig), detectFace(gen)]);
    if (!origFace || !genFace) {
      logError('restore', 'warn', 'Face detection incompleta, fallback raw', { origFace: !!origFace, genFace: !!genFace }, true);
      return genDataUrl;
    }

    // Main canvas
    const c = document.createElement('canvas');
    c.width = gen.width; c.height = gen.height;
    const ctx = c.getContext('2d');
    ctx.drawImage(gen, 0, 0);

    // Face canvas - scala l'ellisse volto originale nella posizione del volto generato
    const fc = document.createElement('canvas');
    fc.width = gen.width; fc.height = gen.height;
    const fctx = fc.getContext('2d');

    // Padding dal bounding box per includere tutto il viso ma non troppo sopra/sotto
    const pad = 0.1;
    const sx = origFace.x - origFace.width * pad;
    const sy = origFace.y - origFace.height * pad;
    const sw = origFace.width * (1 + 2 * pad);
    const sh = origFace.height * (1 + 2 * pad);
    const dx = genFace.x - genFace.width * pad;
    const dy = genFace.y - genFace.height * pad;
    const dw = genFace.width * (1 + 2 * pad);
    const dh = genFace.height * (1 + 2 * pad);

    fctx.drawImage(orig, sx, sy, sw, sh, dx, dy, dw, dh);

    // Alpha mask ellittica con feather
    const cx = dx + dw / 2;
    const cy = dy + dh / 2;
    const rr = Math.max(dw, dh) * 0.58;

    fctx.globalCompositeOperation = 'destination-in';
    const grad = fctx.createRadialGradient(cx, cy, 0, cx, cy, rr);
    grad.addColorStop(0, 'rgba(0,0,0,1)');
    grad.addColorStop(0.65, 'rgba(0,0,0,1)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    fctx.fillStyle = grad;
    fctx.fillRect(0, 0, c.width, c.height);

    // Composite face onto main
    ctx.drawImage(fc, 0, 0);
    logError('restore', 'info', 'Face restored ok', { origBox: origFace, genBox: genFace });
    return c.toDataURL('image/jpeg', 0.92);
  } catch (e) {
    logError('restore', 'warn', `faceRestore error: ${e.message}`, {}, true);
    return genDataUrl;
  }
}

/* =============================================================
   API — Gemini
   ============================================================= */
const GEMINI_BASE = 'https://generativelanguage.googleapis.com/v1beta/models';

async function geminiCall(model, parts, opts = {}) {
  const body = {
    contents: [{ role: 'user', parts }],
    generationConfig: {
      temperature: opts.temperature ?? 0.5,
      maxOutputTokens: opts.maxTokens ?? 3000,
      ...(opts.json ? { responseMimeType: 'application/json' } : {}),
      ...(opts.schema ? { responseSchema: opts.schema } : {}),
      ...(opts.modalities ? { responseModalities: opts.modalities } : {})
    }
  };
  const res = await fetch(`${GEMINI_BASE}/${model}:generateContent?key=${state.keys.gemini}`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(`${model} ${res.status}: ${(await res.text()).slice(0, 300)}`);
  trackCost(model);
  const data = await res.json();
  return data?.candidates?.[0]?.content?.parts || [];
}

async function geminiText(model, prompt, opts = {}) {
  const parts = await geminiCall(model, [{ text: prompt }], opts);
  return parts.map(p => p.text).filter(Boolean).join('\n');
}

async function geminiVision(prompt, base64, mime, opts = {}) {
  const parts = await geminiCall('gemini-2.5-flash', [{ text: prompt }, { inlineData: { mimeType: mime, data: base64 } }], opts);
  return parts.map(p => p.text).filter(Boolean).join('\n');
}

async function nanoBanana(promptText, base64, mime = 'image/jpeg') {
  const candidates = ['gemini-2.5-flash-image', 'gemini-2.5-flash-image-preview'];
  let lastErr = null;
  for (const model of candidates) {
    try {
      const parts = await geminiCall(model, [
        { text: promptText },
        { inlineData: { mimeType: mime, data: base64 } }
      ], { modalities: ['TEXT', 'IMAGE'], maxTokens: 8000, temperature: 0.35 });
      for (const p of parts) {
        const inline = p.inlineData || p.inline_data;
        if (inline?.data) {
          const mt = inline.mimeType || inline.mime_type || 'image/png';
          return `data:${mt};base64,${inline.data}`;
        }
      }
      lastErr = new Error(`${model}: nessuna immagine`);
    } catch (e) { lastErr = e; }
  }
  throw lastErr || new Error('Nano Banana errore');
}

/* =============================================================
   API — Anthropic
   ============================================================= */
async function anthropicCall(system, userMessage, opts = {}) {
  if (!state.keys.anthropic) throw new Error('NO_ANTHROPIC_KEY');
  const model = opts.model || (state.mode === 'quality' ? 'claude-opus-4-7' : 'claude-haiku-4-5-20251001');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'x-api-key': state.keys.anthropic,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({ model, max_tokens: opts.maxTokens || 3000, system, messages: [{ role: 'user', content: userMessage }] })
  });
  if (!res.ok) throw new Error(`Anthropic ${model} ${res.status}: ${(await res.text()).slice(0, 300)}`);
  trackCost(model);
  const data = await res.json();
  return (data?.content || []).filter(p => p.type === 'text').map(p => p.text).join('\n');
}

async function smartReason(system, user, opts = {}) {
  if (state.keys.anthropic && state.preflight.anthropic !== 'fail') {
    try { return await anthropicCall(system, user, opts); }
    catch (e) {
      logError(opts.stage || 'smart', 'warn', `Claude fallito, fallback Gemini Pro`, { error: e.message }, true);
      state.preflight.anthropic = 'fail';
    }
  }
  return await geminiText('gemini-2.5-pro', `${system}\n\n---\n\n${user}`, { json: true, maxTokens: opts.maxTokens || 3000 });
}

async function preflightAnthropic() {
  if (!state.keys.anthropic) { state.preflight.anthropic = 'unknown'; return; }
  state.preflight.anthropic = 'checking'; renderFooter();
  try {
    await anthropicCall('Rispondi "ok".', 'test', { maxTokens: 10, model: 'claude-haiku-4-5-20251001' });
    state.preflight.anthropic = 'ok';
    logError('preflight', 'info', 'Anthropic ok', {});
  } catch (e) {
    state.preflight.anthropic = 'fail';
    logError('preflight', 'warn', `Anthropic fallito: ${e.message}. Uso Gemini Pro fallback.`, {}, true);
  }
  renderFooter();
}

/* =============================================================
   STEP 0 — RECIPE
   ============================================================= */
async function loadRecipe() {
  try {
    const res = await fetch('./RECIPE.md');
    if (res.ok) { state.recipe = await res.text(); return; }
  } catch {}
  state.recipe = FALLBACK_RECIPE;
  logError('recipe', 'warn', 'fetch RECIPE.md fallito, uso fallback', {}, true);
}

/* =============================================================
   STEP 1 — VISION + FACE DETECTION
   ============================================================= */
const VISION_PROMPT = (recipe) => `Sei un consulente d'immagine professionale per consulenza beauty personale. Analizza la foto con occhio tecnico.

${recipe}

Rispondi SOLO con JSON:
{
  "forma_viso": "ovale|tondo|squadrato|cuore|lungo|diamante",
  "lineamenti": "descrizione sintetica",
  "carnagione": "chiara|medio-chiara|media|olivastra|scura",
  "undertone": "warm|cool|neutral",
  "contrasto_naturale": "alto|medio|basso",
  "occhi": { "colore": "...", "forma": "..." },
  "sopracciglia": "...",
  "capelli_naturali": "colore base stimato quando non tinti",
  "capelli_attuali": { "lunghezza": "...", "texture": "lisci|mossi|ricci|afro", "colore": "...", "volume": "..." },
  "trucco_visibile": "...",
  "accessori_visibili": "...",
  "note": "..."
}`;

async function runVision() {
  setState({ step: 'analyzing', loadingMessage: 'Nayla sta guardando la tua foto...', error: null });
  try {
    const raw = await geminiVision(VISION_PROMPT(state.recipe), state.photo.base64, state.photo.mime, { json: true, maxTokens: 1200 });
    state.faceAnalysis = extractJson(raw) || { raw };

    // Parallel: face detection + chromotherapy
    const img = await loadImg(state.photo.dataUrl);
    state.photo.imgElement = img;
    state.faceBboxOriginal = await detectFace(img);
    if (!state.faceBboxOriginal) logError('vision', 'warn', 'Volto non rilevato nell\'originale — face restore disabilitato', {}, true);

    await runChromotherapy();
    setState({ step: 'interview' });
  } catch (e) {
    logError('vision', 'error', e.message, {}, false);
    setState({ error: `Analisi foto fallita: ${e.message}`, step: 'photo' });
  }
}

/* =============================================================
   STEP 2 — CHROMOTHERAPY
   ============================================================= */
async function runChromotherapy() {
  const system = `Sei un'esperta di color analysis con framework Carole Jackson 4-stagioni. Analizza l'undertone + contrasto + capelli naturali + occhi → stagione primaria + eventuale secondaria.

Analisi viso:
${JSON.stringify(state.faceAnalysis, null, 2)}

Rispondi SOLO con JSON:
{
  "stagione_primaria": "Spring|Summer|Autumn|Winter",
  "stagione_secondaria": "Spring|Summer|Autumn|Winter|null",
  "confidence": 0.0-1.0,
  "rationale": "2 frasi italiane: perché questa stagione"
}`;

  try {
    const raw = await smartReason(system, 'Analizza ora.', { stage: 'chromotherapy', maxTokens: 600 });
    const json = extractJson(raw);
    if (!json?.stagione_primaria || !SEASONS[json.stagione_primaria]) throw new Error('Stagione non determinata');
    const s = SEASONS[json.stagione_primaria];
    state.chromotherapy = {
      stagione: json.stagione_primaria,
      stagione_it: s.it,
      stagione_secondaria: json.stagione_secondaria !== 'null' ? json.stagione_secondaria : null,
      confidence: json.confidence || 0.7,
      rationale: json.rationale || '',
      palette: s.palette,
      avoid: s.avoid,
      metal: s.metal,
      lip_family: s.lip
    };
    logError('chromotherapy', 'info', `Stagione: ${json.stagione_primaria} (${json.confidence})`, {});
  } catch (e) {
    logError('chromotherapy', 'warn', `Chromo fallito: ${e.message}, procedo senza`, {}, true);
    state.chromotherapy = null;
  }
}

/* =============================================================
   STEP 3 — PROMPT GEN
   ============================================================= */
async function generatePrompts() {
  setState({ step: 'generating_prompts', loadingMessage: 'Nayla sta costruendo 3 proposte...', error: null });

  const chromoSection = state.chromotherapy ? `
STAGIONE CROMATICA determinata: ${state.chromotherapy.stagione} (${state.chromotherapy.stagione_it}) — confidence ${state.chromotherapy.confidence}
Palette utile: ${state.chromotherapy.palette.join(', ')}
Da evitare: ${state.chromotherapy.avoid.join(', ')}
Metallo gioielli consigliato: ${state.chromotherapy.metal}
Famiglia rossetti: ${state.chromotherapy.lip_family.join(', ')}

I 3 look DEVONO rispettare la stagione salvo vincoli NO utente.` : 'Chromotherapy non disponibile, procedi con buon senso.';

  const glassesDirective = state.preferences.glasses === 'si' ? 'Includi occhiali consigliati per ogni look.'
    : state.preferences.glasses === 'no' ? 'glasses: "niente" per ogni look.'
    : 'Includi occhiali solo se il look lo richiede; altrimenti "niente".';

  const system = `Sei "Nayla", consulente d'immagine italiana senior con expertise in color analysis Jackson e proporzioni viso. Genera ESATTAMENTE 3 look diversi (sicuro / sperimentale / contrasto), completi.

${state.recipe}

Analisi foto:
${JSON.stringify(state.faceAnalysis, null, 2)}

${chromoSection}

Preferenze utente:
${JSON.stringify(state.preferences, null, 2)}

${glassesDirective}

REGOLE IMPERATIVE per ogni english_prompt:
1. APERTURA: "Photorealistic portrait. Preserve subject identity exactly: face shape, skin tone, eye color, eye shape, nose, mouth, chin, cheeks, ears, forehead, neck all unchanged."
2. CENTRO: "Keep the person's face fully recognizable."
3. CHIUSURA: "Do not alter facial structure, complexion, or eye features in any way."
4. Specifica in mezzo: hair (cut+color+styling), makeup (base+eyes+brows), lipstick, earrings, glasses (se previsti), clothing color from seasonal palette, jewelry metal, lighting.
5. Max 180 parole.

Rispondi SOLO con JSON:
{
  "intro": "1-2 frasi calde di Nayla",
  "looks": [
    {
      "title": "...", "vibe": "...",
      "hair": {"taglio":"...","colore":"...","styling":"..."},
      "makeup": {"base":"...","occhi":"...","sopracciglia":"..."},
      "lipstick": "sfumatura italiana coerente con stagione",
      "earrings": "tipo+materiale+dimensione coerente con forma viso e metallo stagione",
      "glasses": "tipo+forma+materiale O 'niente'",
      "clothing_palette": ["#XXXXXX","#XXXXXX","#XXXXXX"],
      "jewelry_metal": "oro giallo|oro rosa|argento|oro bianco|misto",
      "perche_ti_sta": "2 frasi: motivazione + coerenza cromatica",
      "english_prompt": "Photorealistic portrait. Preserve subject identity exactly: ..."
    },
    { ...2 altri look... }
  ]
}`;

  try {
    const raw = await smartReason(system, 'Genera ora.', { stage: 'prompts', maxTokens: 5000 });
    const json = extractJson(raw);
    if (!json?.looks || !Array.isArray(json.looks)) throw new Error('Prompts non generati');
    state.imagePrompts = json.looks.slice(0, 3);
    state.intro = json.intro || '';
    logError('prompts', 'info', `Generati ${state.imagePrompts.length} prompt`, {});
    await runAdversarialCheck();
  } catch (e) {
    logError('prompts', 'error', e.message, {}, false);
    setState({ error: `Generazione fallita: ${e.message}` });
  }
}

/* =============================================================
   STEP 4 — ADVERSARIAL CHECK (V1-V8)
   ============================================================= */
async function runAdversarialCheck() {
  setState({ step: 'adversarial', loadingMessage: 'Nayla sta verificando...', error: null });

  const chromoContext = state.chromotherapy ? `
STAGIONE: ${state.chromotherapy.stagione}
Palette consentita: ${state.chromotherapy.palette.join(', ')}
Da evitare: ${state.chromotherapy.avoid.join(', ')}
Metallo: ${state.chromotherapy.metal}
Rossetti: ${state.chromotherapy.lip_family.join(', ')}
` : 'Nessuna stagione (salta V8).';

  const system = `Agente avversariale rigoroso. Verifica 8 criteri per ogni prompt. Evidence testuale richiesta (>=10 char). Se non cita → fail.

${state.recipe}

${chromoContext}

Preferenze utente: ${JSON.stringify(state.preferences)}

PROMPT DA VERIFICARE:
${JSON.stringify(state.imagePrompts.map((p, i) => ({ index: i, ...p })), null, 2)}

CHECKLIST:
- V1 preserve_identity: apertura + centro + chiusura di preservazione volto presenti?
- V2 cites_dialogue: cita almeno 2 elementi concreti dalle preferenze utente?
- V3 respects_no: rispetta tutti i "NO"?
- V4 coherent_adjectives: coerente con aggettivi aspirazionali?
- V5 covers_all: hair + makeup + lipstick + earrings + glasses + clothing_palette + jewelry_metal tutti presenti?
- V6 no_invented: non aggiunge elementi non discussi?
- V7 clean_english: inglese pulito, < 180 parole?
- V8 chromo_consistency: palette abiti coerente con stagione, metallo coerente, rossetto dalla gamma stagione? (skip se stagione null)

Rispondi SOLO JSON:
{
  "verdicts": [
    {
      "prompt_index": 0,
      "verdict": "pass" | "fail",
      "checks": {
        "V1_preserve_identity": {"pass":true,"evidence":"..."},
        "V2_cites_dialogue": {"pass":true,"evidence":"..."},
        "V3_respects_no": {"pass":true,"evidence":"..."},
        "V4_coherent_adjectives": {"pass":true,"evidence":"..."},
        "V5_covers_all": {"pass":true,"evidence":"..."},
        "V6_no_invented": {"pass":true,"evidence":"..."},
        "V7_clean_english": {"pass":true,"evidence":"..."},
        "V8_chromo_consistency": {"pass":true,"evidence":"..."}
      },
      "fix_hint": "null se pass; se fail, istruzione SPECIFICA"
    }
  ]
}`;

  try {
    const raw = await smartReason(system, 'Verifica ora.', { stage: 'adversarial', maxTokens: 5000 });
    const json = extractJson(raw);
    if (!json?.verdicts) throw new Error('Adversarial output non interpretabile');
    for (const v of json.verdicts) {
      if (v.checks) {
        for (const k of Object.keys(v.checks)) {
          const ev = v.checks[k].evidence || '';
          if (v.checks[k].pass && ev.length < 10) {
            v.checks[k].pass = false;
            v.verdict = 'fail';
            v.fix_hint = v.fix_hint || `Check ${k} failed: evidence insufficiente.`;
          }
        }
      }
    }
    state.verdicts = json.verdicts;
    const failing = json.verdicts.filter(v => v.verdict === 'fail');
    logError('adversarial', 'info', `${json.verdicts.length} verdetti, ${failing.length} fail`, {});
    if (failing.length === 0) await generateAllImages();
    else await runCorrector(failing);
  } catch (e) {
    logError('adversarial', 'warn', `Fallito, procedo: ${e.message}`, {}, true);
    await generateAllImages();
  }
}

/* =============================================================
   STEP 5 — CORRECTOR
   ============================================================= */
async function runCorrector(failingVerdicts) {
  setState({ step: 'correcting', loadingMessage: `Nayla sta rifinendo ${failingVerdicts.length}...`, error: null });
  const toFix = failingVerdicts.filter(v => (state.correctionIterations[v.prompt_index] || 0) < state.MAX_CORRECTION_ITER);
  if (toFix.length === 0) { await generateAllImages(); return; }

  const system = `Agente di correzione. Applica minimalmente i fix_hint sui prompt, senza stravolgere.

${state.recipe}

${state.chromotherapy ? 'STAGIONE: ' + state.chromotherapy.stagione + ', palette: ' + state.chromotherapy.palette.join(', ') : ''}

PROMPT DA CORREGGERE:
${JSON.stringify(toFix.map(v => ({ index: v.prompt_index, original: state.imagePrompts[v.prompt_index], fix_hint: v.fix_hint })), null, 2)}

Rispondi SOLO JSON:
{"corrected":[{"index":0,"english_prompt":"...","title":"...","vibe":"...","hair":{},"makeup":{},"lipstick":"...","earrings":"...","glasses":"...","clothing_palette":[],"jewelry_metal":"...","perche_ti_sta":"..."}]}`;

  try {
    const raw = await smartReason(system, 'Correggi.', { stage: 'correction', maxTokens: 4000 });
    const json = extractJson(raw);
    if (!json?.corrected) throw new Error('Corrector output non interpretabile');
    for (const c of json.corrected) {
      if (typeof c.index !== 'number') continue;
      state.correctionIterations[c.index] = (state.correctionIterations[c.index] || 0) + 1;
      state.imagePrompts[c.index] = { ...state.imagePrompts[c.index], ...c };
    }
    logError('correction', 'info', `Corretti ${json.corrected.length}`, {});
    await runAdversarialCheck();
  } catch (e) {
    logError('correction', 'warn', `Fallito: ${e.message}, procedo`, {}, true);
    await generateAllImages();
  }
}

/* =============================================================
   STEP 6 + 7 — IMAGE GEN + FACE RESTORE
   ============================================================= */
async function generateAllImages() {
  setState({ step: 'generating', loadingMessage: 'Nayla sta disegnando e rifinendo i volti...', error: null });
  state.generatedRaw = {}; state.generatedImages = {}; state.showRaw = {};
  render();
  await Promise.all(state.imagePrompts.map((look, i) => generateOne(i, look)));
  setState({ step: 'results' });
}

async function generateOne(i, look, retry = 0) {
  try {
    const raw = await nanoBanana(look.english_prompt, state.photo.base64, state.photo.mime);
    state.generatedRaw[i] = raw;
    render();
    const restored = await faceRestore(state.photo.dataUrl, raw);
    state.generatedImages[i] = restored;
    logError('images', 'info', `Immagine ${i} ok (restored: ${restored !== raw})`, {});
    render();
  } catch (e) {
    if (retry < 1) return generateOne(i, look, retry + 1);
    logError('images', 'error', `Immagine ${i} fallita`, { error: e.message }, false);
    state.generatedImages[i] = { error: e.message };
    render();
  }
}

function mkTextarea(label, hint, placeholder, value, onChange) {
  const l = el('label', { class: 'block text-sm font-medium text-stone-800 mb-1', text: label });

  t.addEventListener('input', e => onChange(e.target.value));

}

function renderGenerating() {
  const wrap = el('div', { class: 'bg-white rounded-2xl shadow-sm border border-stone-200 p-8 fade-in' });
  wrap.appendChild(el('div', { class: 'flex items-center gap-3 mb-4' }, [
    el('div', { class: 'w-5 h-5 border-2 border-stone-300 border-t-stone-900 rounded-full spinner' }),
    el('h2', { class: 'display text-xl', text: 'Nayla sta disegnando e rifinendo i volti...' })
  ]));
  const list = el('div', { class: 'space-y-2' });
  state.imagePrompts.forEach((look, i) => {
    const done = state.generatedImages[i];
    const raw = state.generatedRaw[i];
    let status = '…', color = 'text-stone-400';
    if (done && done.error) { status = '✕'; color = 'text-rose-500'; }
    else if (done) { status = '✓'; color = 'text-emerald-600'; }
    else if (raw) { status = '↻'; color = 'text-amber-600'; }
    list.appendChild(el('div', { class: 'flex items-center gap-3 text-sm' }, [
      el('span', { class: `${color} font-mono`, text: status }),
      el('span', { text: look.title })
    ]));
  });
  wrap.appendChild(list);
  wrap.appendChild(el('p', { class: 'text-xs text-stone-500 mt-4', text: 'Generazione Nano Banana + face restoration canvas in parallelo.' }));
  return wrap;
}

function renderChromotherapyCard() {
  if (!state.chromotherapy) return null;
  const c = state.chromotherapy;
  const card = el('div', { class: 'look-card bg-white rounded-2xl shadow-sm border border-stone-200 p-5 md:p-6' });
  card.appendChild(el('p', { class: 'text-[10px] tracking-[0.2em] uppercase text-stone-400', text: 'Stagione cromatica' }));
  card.appendChild(el('h3', { class: 'display text-2xl text-stone-900', text: c.stagione_it + (c.stagione_secondaria ? ` (+ ${SEASONS[c.stagione_secondaria]?.it || c.stagione_secondaria})` : '') }));
  card.appendChild(el('p', { class: 'text-sm italic text-stone-600 mt-1 mb-4', text: c.rationale || '' }));

  // Palette
  const palWrap = el('div', { class: 'mb-3' });
  palWrap.appendChild(el('p', { class: 'text-[10px] uppercase tracking-wider text-stone-500 mb-2', text: 'Palette abiti consigliata' }));
  const palSw = el('div', { class: 'flex flex-wrap gap-2' });
  c.palette.forEach(col => palSw.appendChild(el('span', { class: 'swatch', style: `background:${col}`, title: col })));
  palWrap.appendChild(palSw);
  card.appendChild(palWrap);

  // Avoid
  const avWrap = el('div', { class: 'mb-3' });
  avWrap.appendChild(el('p', { class: 'text-[10px] uppercase tracking-wider text-stone-500 mb-2', text: 'Colori da evitare' }));
  const avSw = el('div', { class: 'flex gap-2' });
  c.avoid.forEach(col => avSw.appendChild(el('span', { class: 'swatch opacity-70', style: `background:${col}`, title: col })));
  avWrap.appendChild(avSw);
  card.appendChild(avWrap);

  card.appendChild(el('div', { class: 'grid grid-cols-2 gap-3 pt-3 border-t border-stone-100' }, [
    el('div', {}, [
      el('p', { class: 'text-[10px] uppercase tracking-wider text-stone-500', text: 'Metallo gioielli' }),
      el('p', { class: 'text-sm text-stone-800', text: c.metal })
    ]),
    el('div', {}, [
      el('p', { class: 'text-[10px] uppercase tracking-wider text-stone-500', text: 'Famiglia rossetti' }),
      el('p', { class: 'text-sm text-stone-800', text: c.lip_family.join(', ') })
    ])
  ]));

  card.appendChild(el('p', { class: 'text-[10px] text-stone-400 italic mt-3 pt-2 border-t border-stone-100', text: 'Orientamento Jackson 4-stagioni. Bussola, non gabbia.' }));
  return card;
}

function renderResults() {
  const container = el('div', { class: 'space-y-6 fade-in' });

  const toolbar = el('div', { class: 'flex items-center justify-between no-print flex-wrap gap-2' }, [
    el('h2', { class: 'display text-2xl', text: 'Ecco i tuoi look' }),
    el('div', { class: 'flex gap-2 flex-wrap' }, [
      el('button', { class: 'px-3 py-2 text-sm rounded-lg border border-stone-300 hover:bg-stone-100', onclick: () => { state.generatedImages = {}; state.generatedRaw = {}; generateAllImages(); } }, '↻ Rigenera tutte'),
      el('button', { class: 'px-3 py-2 text-sm rounded-lg border border-stone-300 hover:bg-stone-100', onclick: () => window.print() }, '🖨 Stampa'),
      el('button', { class: 'px-3 py-2 text-sm rounded-lg border border-stone-300 hover:bg-stone-100', onclick: resetSession }, '↻ Nuovo look')
    ])
  ]);
  container.appendChild(toolbar);

  if (state.intro) container.appendChild(el('p', { class: 'text-stone-700 italic', text: '"' + state.intro + '" — Nayla' }));

  // Chromotherapy card
  const chromoCard = renderChromotherapyCard();
  if (chromoCard) container.appendChild(chromoCard);

  state.imagePrompts.forEach((look, i) => {
    const img = state.showRaw[i] ? state.generatedRaw[i] : state.generatedImages[i];
    const verdict = state.verdicts?.find(v => v.prompt_index === i);
    const card = el('div', { class: 'look-card bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden' });
    const grid = el('div', { class: 'grid md:grid-cols-2' });

    // Image column
    const imgCol = el('div', { class: 'bg-stone-100 p-4 flex flex-col gap-3 items-center justify-center' });
    imgCol.appendChild(el('p', { class: 'text-[10px] tracking-[0.2em] uppercase text-stone-500', text: state.showRaw[i] ? 'Prima → Dopo (raw, no restore)' : 'Prima → Dopo (viso preservato)' }));
    const pair = el('div', { class: 'flex gap-3 w-full justify-center' });
    pair.appendChild(el('img', { src: state.photo.dataUrl, class: 'w-1/2 max-w-[160px] rounded-lg object-cover' }));
    if (typeof img === 'string') {
      pair.appendChild(el('img', { src: img, class: 'w-1/2 max-w-[160px] rounded-lg object-cover' }));
    } else if (img && img.error) {
      const errBox = el('div', { class: 'w-1/2 max-w-[160px] aspect-square rounded-lg bg-rose-50 border border-rose-200 p-2 text-[10px] text-rose-700 flex flex-col justify-between' });
      errBox.appendChild(el('div', { text: (img.error || '').slice(0, 120) }));
      errBox.appendChild(el('button', { class: 'mt-1 text-xs underline text-rose-800', onclick: async () => { delete state.generatedImages[i]; delete state.generatedRaw[i]; render(); await generateOne(i, look); } }, '↻ Riprova'));
      pair.appendChild(errBox);
    } else {
      pair.appendChild(el('div', { class: 'w-1/2 max-w-[160px] aspect-square rounded-lg bg-stone-200 animate-pulse' }));
    }
    imgCol.appendChild(pair);

    // Action buttons
    if (typeof img === 'string') {
      const actions = el('div', { class: 'flex gap-2 flex-wrap justify-center text-[10px] no-print' });
      actions.appendChild(el('a', { href: img, download: `look-${i+1}.jpg`, class: 'underline text-stone-600' }, '⬇ scarica'));
      if (state.generatedRaw[i] && state.generatedImages[i] && typeof state.generatedImages[i] === 'string') {
        actions.appendChild(el('button', { class: 'underline text-stone-600', onclick: () => { state.showRaw[i] = !state.showRaw[i]; render(); } }, state.showRaw[i] ? 'vedi con viso preservato' : 'vedi raw (no restore)'));
      }
      actions.appendChild(el('button', { class: 'underline text-stone-600', onclick: async () => { delete state.generatedImages[i]; delete state.generatedRaw[i]; render(); await generateOne(i, look); } }, '↻ solo questa'));
      actions.appendChild(el('button', { class: 'underline text-stone-600', onclick: () => { state.editPromptIndex = (state.editPromptIndex === i ? null : i); render(); } }, '✏ modifica prompt'));
      imgCol.appendChild(actions);
    }
    grid.appendChild(imgCol);

    // Text column
    const txt = el('div', { class: 'p-5 md:p-6 space-y-3' });
    const verdictTag = verdict ? ' · ' + (verdict.verdict === 'pass' ? '✓ verificata' : '△ approssimativa') : '';
    txt.appendChild(el('div', {}, [
      el('p', { class: 'text-[10px] tracking-[0.2em] uppercase text-stone-400', text: `Proposta ${i+1}${verdictTag}` }),
      el('h3', { class: 'display text-2xl text-stone-900', text: look.title || '—' }),
      el('p', { class: 'text-sm italic text-stone-600 mt-1', text: look.vibe || '' })
    ]));

    const field = (label, value) => el('div', {}, [
      el('p', { class: 'text-[10px] uppercase tracking-wider text-stone-500', text: label }),
      el('p', { class: 'text-sm text-stone-800', text: value || '—' })
    ]);

    const hair = look.hair || {}, makeup = look.makeup || {};
    const g2 = el('div', { class: 'grid grid-cols-2 gap-3 pt-2 border-t border-stone-100' });
    g2.append(
      field('Taglio', hair.taglio), field('Colore capelli', hair.colore),
      field('Styling', hair.styling), field('Base trucco', makeup.base),
      field('Occhi', makeup.occhi), field('Sopracciglia', makeup.sopracciglia),
      field('Rossetto', look.lipstick), field('Orecchini', look.earrings),
      field('Occhiali', look.glasses), field('Metallo gioielli', look.jewelry_metal)
    );
    txt.appendChild(g2);

    // Palette abiti
    if (Array.isArray(look.clothing_palette) && look.clothing_palette.length) {
      const palBox = el('div', { class: 'pt-2 border-t border-stone-100' });
      palBox.appendChild(el('p', { class: 'text-[10px] uppercase tracking-wider text-stone-500 mb-1', text: 'Palette abito' }));
      const sw = el('div', { class: 'flex gap-2' });
      look.clothing_palette.forEach(c => sw.appendChild(el('span', { class: 'swatch', style: `background:${c}`, title: c })));
      palBox.appendChild(sw);
      txt.appendChild(palBox);
    }

    if (look.perche_ti_sta) {
      txt.appendChild(el('div', { class: 'pt-2 border-t border-stone-100' }, [
        el('p', { class: 'text-[10px] uppercase tracking-wider text-stone-500 mb-1', text: 'Perché ti sta — Nayla' }),
        el('p', { class: 'text-sm text-stone-700 italic', text: look.perche_ti_sta })
      ]));
    }

    // Edit prompt
    if (state.editPromptIndex === i) {
      const editBox = el('div', { class: 'pt-2 border-t border-stone-100 space-y-2 no-print' });
      editBox.appendChild(el('p', { class: 'text-[10px] uppercase tracking-wider text-stone-500', text: 'Modifica prompt (english)' }));
      const ta = el('textarea', { class: 'w-full px-3 py-2 rounded-lg border border-stone-300 text-xs font-mono focus:outline-none focus:border-stone-900 min-h-[120px]' });
      ta.value = look.english_prompt || '';
      const saveBtn = el('button', {
        class: 'px-3 py-1 text-xs rounded-lg bg-stone-900 text-white hover:bg-stone-800',
        onclick: async () => {
          state.imagePrompts[i].english_prompt = ta.value;
          state.editPromptIndex = null;
          delete state.generatedImages[i]; delete state.generatedRaw[i];
          render();
          await generateOne(i, state.imagePrompts[i]);
        }
      }, 'Salva e rigenera');
      editBox.append(ta, saveBtn);
      txt.appendChild(editBox);
    }

    if (verdict) {
      const det = el('details', { class: 'no-print pt-2 border-t border-stone-100' });
      det.appendChild(el('summary', { class: 'text-xs text-stone-500 underline', text: 'Dettagli tecnici (checklist V1-V8)' }));
      const checksDiv = el('div', { class: 'mt-2 space-y-1 text-xs text-stone-600' });
      Object.entries(verdict.checks || {}).forEach(([k, v]) => checksDiv.appendChild(el('div', { text: `${v.pass ? '✓' : '✕'} ${k}${v.evidence ? ' — ' + v.evidence.slice(0, 80) : ''}` })));
      if (verdict.fix_hint) checksDiv.appendChild(el('div', { class: 'text-amber-700 mt-1', text: 'fix: ' + verdict.fix_hint }));
      det.appendChild(checksDiv);
      txt.appendChild(det);
    }

    grid.appendChild(txt);
    card.appendChild(grid);
    container.appendChild(card);
  });

  const errorsInSession = state.errorLog.filter(e => e.severity === 'error').length;
  if (errorsInSession > 0) {
    container.appendChild(el('div', { class: 'rounded-lg bg-amber-50 border border-amber-200 p-3 text-xs text-amber-800 no-print' }, [
      el('span', { text: `Nota: ${errorsInSession} errore/i in questa sessione. ` }),
      el('button', { class: 'underline font-medium', onclick: downloadLog }, 'Scarica log')
    ]));
  }

  container.appendChild(el('p', { class: 'text-xs text-stone-400 text-center pt-4 no-print', text: `v0.4 · face-preserving · ${state.mode} · ${state.preflight.anthropic === 'fail' ? 'Gemini Pro' : 'Claude ' + (state.mode === 'quality' ? 'Opus 4.7' : 'Haiku 4.5')} + Gemini vision + Nano Banana + MediaPipe` }));
  return container;
}

/* =============================================================
   BOOT
   ============================================================= */
(async () => {
  if (state.keys.gemini) {
    await loadRecipe();
    if (state.recipe) state.step = 'photo';
    if (state.keys.anthropic) preflightAnthropic();
    // Preload MediaPipe in background
    initFaceDetector();
  }
  render();
})();
</script>
</body>
</html>
