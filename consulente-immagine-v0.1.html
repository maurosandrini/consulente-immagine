<html lang="it">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">

<body class="bg-stone-50 min-h-screen text-stone-900">
<div id="app" class="max-w-3xl mx-auto px-4 py-8 md:py-12"></div>

<script>
/* =============================================================
   STATE
   ============================================================= */
const state = {
  step: 'setup',
  geminiApiKey: localStorage.getItem('ci_gemini_key') || '',
  userName: localStorage.getItem('ci_user_name') || '',
  photoBase64: null,
  photoDataUrl: null,
  photoMime: 'image/jpeg',
  visionAnalysis: null,
  initialAnswers: { occasione: '', attuale: '', mood: '', vincoli: '', tempo: '' },
  conversation: [],
  looks: null,
  generatedImages: {},
  error: null,
  dialogueTurn: 0,
  MAX_TURNS: 8,
  MIN_TURNS: 2
};

const setState = (patch) => { Object.assign(state, patch); render(); };

/* =============================================================
   UTIL
   ============================================================= */
const el = (tag, attrs = {}, children = []) => {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') node.className = v;
    else if (k === 'html') node.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'text') node.textContent = v;
    else node.setAttribute(k, v);
  }
  for (const c of [].concat(children)) if (c) node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  return node;
};

const compressImage = (file, maxSide = 1280, quality = 0.88) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', quality);
      const base64 = dataUrl.split(',')[1];
      resolve({ dataUrl, base64, mime: 'image/jpeg' });
    };
    img.onerror = reject;
    img.src = reader.result;
  };
  reader.onerror = reject;
  reader.readAsDataURL(file);
});

const extractJson = (text) => {
  if (!text) return null;
  const stripped = text.replace(/```(?:json)?\s*|\s*```/g, '');
  try { return JSON.parse(stripped); } catch {}
  const match = stripped.match(/\{[\s\S]*\}/);
  if (match) { try { return JSON.parse(match[0]); } catch {} }
  return null;
};

/* =============================================================
   API CALLS
   ============================================================= */
const GEMINI_BASE = 'https://generativelanguage.googleapis.com/v1beta/models';

async function geminiVision(prompt, base64, mime = 'image/jpeg') {
  const url = `${GEMINI_BASE}/gemini-2.5-flash:generateContent?key=${state.geminiApiKey}`;
  const body = {
    contents: [{
      parts: [
        { text: prompt },
        { inline_data: { mime_type: mime, data: base64 } }
      ]
    }],
    generationConfig: { temperature: 0.4, maxOutputTokens: 800 }
  };
  const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (!res.ok) throw new Error(`Gemini vision ${res.status}: ${await res.text()}`);
  const data = await res.json();
  const text = data?.candidates?.[0]?.content?.parts?.map(p => p.text).filter(Boolean).join('\n') || '';
  return text;
}

async function nanoBananaEdit(promptText, base64, mime = 'image/jpeg') {
  const candidateModels = ['gemini-2.5-flash-image', 'gemini-2.5-flash-image-preview'];
  let lastErr = null;
  for (const model of candidateModels) {
    try {
      const url = `${GEMINI_BASE}/${model}:generateContent?key=${state.geminiApiKey}`;
      const body = {
        contents: [{
          role: 'user',
          parts: [
            { text: promptText },
            { inlineData: { mimeType: mime, data: base64 } }
          ]
        }],
        generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
      };
      const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      if (!res.ok) { lastErr = new Error(`${model} ${res.status}: ${(await res.text()).slice(0, 300)}`); continue; }
      const data = await res.json();
      const parts = data?.candidates?.[0]?.content?.parts || [];
      for (const part of parts) {
        const inline = part.inlineData || part.inline_data;
        if (inline?.data) {
          const mt = inline.mimeType || inline.mime_type || 'image/png';
          return `data:${mt};base64,${inline.data}`;
        }
      }
      lastErr = new Error(`${model}: nessuna immagine nella risposta (ricevuto solo testo)`);
    } catch (e) { lastErr = e; }
  }
  throw lastErr || new Error('Nano Banana: errore sconosciuto');
}

const DIALOGUE_SCHEMA = {
  type: 'object',
  properties: {
    action: { type: 'string', enum: ['ask', 'propose'] },
    question: { type: 'string' },
    intro: { type: 'string' },
    looks: {
      type: 'array',
      items: {
        type: 'object',
        properties: {
          title: { type: 'string' },
          vibe: { type: 'string' },
          hair: {
            type: 'object',
            properties: { taglio: { type: 'string' }, colore: { type: 'string' }, styling: { type: 'string' } }
          },
          makeup: {
            type: 'object',
            properties: { base: { type: 'string' }, occhi: { type: 'string' }, sopracciglia: { type: 'string' } }
          },
          lipstick: { type: 'string' },
          earrings: { type: 'string' },
          perche_ti_sta: { type: 'string' },
          image_prompt: { type: 'string' }
        }
      }
    }
  },
  required: ['action']
};

async function geminiChat(prompt, opts = {}) {
  const body = {
    contents: [{ parts: [{ text: prompt }] }],
    generationConfig: {
      temperature: opts.temperature ?? 0.7,
      maxOutputTokens: 3500,
      responseMimeType: 'application/json',
      responseSchema: DIALOGUE_SCHEMA
    }
  };
  const tryModel = async (model) => {
    const url = `${GEMINI_BASE}/${model}:generateContent?key=${state.geminiApiKey}`;
    const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!res.ok) throw new Error(`${model} ${res.status}: ${await res.text()}`);
    const data = await res.json();
    return data?.candidates?.[0]?.content?.parts?.map(p => p.text).filter(Boolean).join('\n') || '';
  };
  try { return await tryModel('gemini-2.5-pro'); }
  catch (e1) { return await tryModel('gemini-2.5-flash'); }
}

/* =============================================================
   DOMAIN LOGIC
   ============================================================= */
const VISION_PROMPT = `Sei un consulente d'immagine. Analizza la foto con occhio professionale e sintetizza in italiano, in JSON valido, queste caratteristiche oggettive (NON giudizi estetici, solo osservazioni fattuali utili a suggerire un look):

{
  "forma_viso": "ovale|tondo|squadrato|cuore|lungo|diamante",
  "lineamenti": "descrizione sintetica (zigomi, mento, fronte)",
  "carnagione": "chiara|medio-chiara|media|olivastra|scura + undertone fredda|calda|neutra se deducibile",
  "occhi": "colore e forma",
  "sopracciglia": "colore, spessore, forma",
  "capelli_attuali": {
    "lunghezza": "...",
    "texture": "lisci|mossi|ricci|afro",
    "colore": "...",
    "volume": "..."
  },
  "trucco_visibile": "nessuno|naturale|marcato + dettagli se visibili",
  "accessori_visibili": "nessuno|descrizione",
  "note": "qualsiasi dettaglio utile a un consulente (es. orecchini di un certo tipo, stile percepito)"
}

Rispondi SOLO con il JSON, nient'altro.`;

const buildDialoguePrompt = () => {
  const vision = state.visionAnalysis ? JSON.stringify(state.visionAnalysis, null, 2) : 'non disponibile';
  const answers = JSON.stringify(state.initialAnswers, null, 2);
  const convo = state.conversation.map(m => `${m.role === 'user' ? 'LEI' : 'CONSULENTE'}: ${m.content}`).join('\n\n') || '(ancora vuoto)';
  return `Sei "Nayla", consulente d'immagine italiana esperta, calda, curiosa, mai giudicante. Stai aiutando ${state.userName || 'la tua cliente'} a costruire 2-3 proposte di look complete (capelli, trucco, rossetto, orecchini) da portare alla parrucchiera.

IMPORTANTE: La tua risposta DEVE essere esclusivamente un oggetto JSON valido, senza testo prima o dopo, senza markdown, senza backtick.

## Dati oggettivi dalla foto
${vision}

## Risposte all'intervista iniziale
${answers}

## Dialogo finora
${convo}

## Il tuo compito ADESSO
Sei al turno ${state.dialogueTurn + 1} su un massimo di ${state.MAX_TURNS}. Minimo turni prima di proporre: ${state.MIN_TURNS}.

IMPORTANTE: sii CONCRETA e RAPIDA. Dopo ${state.MIN_TURNS + 1} turni dovresti già proporre i look salvo grosse lacune. Non fare domande decorative. Se l'utente dice "proponi ora" / "basta" / "adesso", metti subito action=propose.

Decidi se:
A) fare UNA domanda di approfondimento (mirata, concreta, calda, una alla volta, massimo 2 frasi + eventuali opzioni tra parentesi)
B) proporre i look (SOLO se hai informazioni sufficienti su: stile di vita, preferenze cromatiche, vincoli, icone/riferimenti o parole-chiave aspirazionali)

Regole:
- Mai fare più di UNA domanda per volta
- Mai chiedere cose già note dalle risposte o dal dialogo
- Se proponi, genera 2-3 look DIVERSI tra loro (es. uno più sicuro, uno più sperimentale) con dettagli specifici
- Ogni look deve avere un "image_prompt" in INGLESE per un modello di image editing che modifichera la foto ORIGINALE preservando identita, forma viso, carnagione e colore occhi. Il prompt deve essere molto specifico e fotorealistico.

Rispondi SOLO con JSON valido, nient'altro:

Se scegli A:
{
  "action": "ask",
  "question": "testo della domanda (italiano, caldo)",
  "internal_note": "cosa stai cercando di capire (non mostrato)"
}

Se scegli B:
{
  "action": "propose",
  "intro": "1-2 frasi di accompagnamento alle proposte",
  "looks": [
    {
      "title": "nome evocativo del look (max 5 parole)",
      "vibe": "1 frase che riassume il mood",
      "hair": { "taglio": "...", "colore": "...", "styling": "..." },
      "makeup": { "base": "...", "occhi": "...", "sopracciglia": "..." },
      "lipstick": "sfumatura specifica (es. 'rosa mauve tenue')",
      "earrings": "tipo, materiale, dimensione (es. 'piccoli cerchi oro giallo 1.5cm')",
      "perche_ti_sta": "2 frasi: perche questo look valorizza i suoi tratti",
      "image_prompt": "English, photorealistic portrait editing prompt. Preserve subject identity, face shape, skin tone, eye color EXACTLY. Change ONLY: hair (cut/color/styling), makeup, earrings, lipstick. Specific details..."
    }
  ]
}`;
};

/* =============================================================
   NAVIGATION
   ============================================================= */
function goPhoto() { setState({ step: 'photo', error: null }); }

async function runVisionAnalysis() {
  setState({ step: 'analyzing', error: null });
  try {
    const raw = await geminiVision(VISION_PROMPT, state.photoBase64, state.photoMime);
    const json = extractJson(raw) || { raw };
    setState({ visionAnalysis: json, step: 'interview' });
  } catch (e) {
    setState({ error: `Analisi foto fallita: ${e.message}`, step: 'photo' });
  }
}

async function startDialogue() {
  setState({ step: 'dialogue', conversation: [], dialogueTurn: 0, error: null });
  await dialogueStep();
}

async function dialogueStep(retry = 0) {
  try {
    state.isLoading = true; render();
    const raw = await geminiChat(buildDialoguePrompt(), { temperature: retry === 0 ? 0.7 : 0.2 });
    const json = extractJson(raw);
    state.isLoading = false;
    if (!json || !json.action) {
      if (retry < 2) return dialogueStep(retry + 1);
      throw new Error('Il modello continua a rispondere fuori formato. Prova a cliccare "Proponi ora i look".');
    }
    if (json.action === 'ask' && json.question) {
      state.conversation.push({ role: 'assistant', content: json.question });
      state.dialogueTurn += 1;
      render();
    } else if (json.action === 'propose' && Array.isArray(json.looks) && json.looks.length > 0) {
      state.looks = json.looks;
      state.intro = json.intro || '';
      await generateAllImages();
    } else {
      if (retry < 2) return dialogueStep(retry + 1);
      throw new Error('Risposta non completa dal modello. Prova a riprovare.');
    }
  } catch (e) {
    state.isLoading = false;
    setState({ error: e.message });
  }
}

async function userReply(text) {
  if (!text.trim()) return;
  state.conversation.push({ role: 'user', content: text.trim() });
  render();
  await dialogueStep();
}

async function generateAllImages() {
  setState({ step: 'generating', error: null });
  for (let i = 0; i < state.looks.length; i++) {
    const look = state.looks[i];
    try {
      const img = await nanoBananaEdit(look.image_prompt, state.photoBase64, state.photoMime);
      state.generatedImages[i] = img;
      render();
    } catch (e) {
      state.generatedImages[i] = { error: e.message };
      render();
    }
  }
  setState({ step: 'results' });
}

function resetAll() {
  state.photoBase64 = null;
  state.photoDataUrl = null;
  state.visionAnalysis = null;
  state.initialAnswers = { occasione: '', attuale: '', mood: '', vincoli: '', tempo: '' };
  state.conversation = [];
  state.looks = null;
  state.generatedImages = {};
  state.dialogueTurn = 0;
  state.error = null;
  setState({ step: 'photo' });
}

/* =============================================================
   RENDER
   ============================================================= */
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  app.appendChild(renderHeader());
  if (state.error) app.appendChild(renderError());
  const step = ({
    setup: renderSetup, photo: renderPhoto, analyzing: renderAnalyzing,
    interview: renderInterview, dialogue: renderDialogue,
    generating: renderGenerating, results: renderResults
  })[state.step];
  if (step) app.appendChild(step());
}

function renderHeader() {
  return el('header', { class: 'mb-8 text-center fade-in no-print' }, [
    el('p', { class: 'text-[10px] tracking-[0.35em] text-stone-500 uppercase mb-2', text: 'v0.1 · privato' }),
    el('h1', { class: 'display text-4xl md:text-5xl font-light text-stone-900 leading-tight', text: "Il tuo consulente d'immagine" }),
    el('p', { class: 'text-stone-600 mt-3 max-w-lg mx-auto', text: 'Una foto, qualche domanda, e tre proposte di look da portare alla tua parrucchiera.' })
  ]);
}

function renderError() {
  return el('div', { class: 'mb-6 rounded-xl border border-rose-200 bg-rose-50 p-4 text-sm text-rose-800 fade-in no-print' }, [
    el('div', { class: 'font-medium mb-1', text: 'Qualcosa è andato storto' }),
    el('div', { text: state.error }),
    el('button', {
      class: 'mt-2 text-xs underline',
      onclick: () => setState({ error: null })
    }, 'Chiudi')
  ]);
}

function renderSetup() {
  const wrap = el('div', { class: 'bg-white rounded-2xl shadow-sm border border-stone-200 p-6 md:p-8 fade-in' });
  wrap.appendChild(el('h2', { class: 'display text-2xl mb-4', text: 'Benvenuta. Due cose, una volta sola.' }));
  wrap.appendChild(el('p', { class: 'text-sm text-stone-600 mb-6', html: 'La prima è una chiave API gratuita di Google per generare le immagini. La ottieni in 30 secondi: vai su <a class="underline text-stone-900" href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">Google AI Studio</a>, login con Google, "Create API key", copia e incolla qui.' }));

  const nameInput = el('input', {
    type: 'text', placeholder: 'Il tuo nome',
    class: 'w-full px-4 py-3 rounded-lg border border-stone-300 focus:outline-none focus:border-stone-900 mb-4',
    value: state.userName
  });
  const keyInput = el('input', {
    type: 'password', placeholder: 'API key Gemini (AIza...)',
    class: 'w-full px-4 py-3 rounded-lg border border-stone-300 focus:outline-none focus:border-stone-900 mb-2 font-mono text-sm',
    value: state.geminiApiKey
  });
  const keyHint = el('p', { class: 'text-xs text-stone-500 mb-6', text: 'La chiave viene salvata solo sul tuo browser. Piano gratuito: ampio per uso personale.' });

  const btn = el('button', {
    class: 'w-full py-3 rounded-lg bg-stone-900 text-white font-medium hover:bg-stone-800 transition',
    onclick: () => {
      if (!keyInput.value.trim()) { setState({ error: 'Serve una API key per continuare.' }); return; }
      localStorage.setItem('ci_gemini_key', keyInput.value.trim());
      localStorage.setItem('ci_user_name', nameInput.value.trim());
      state.geminiApiKey = keyInput.value.trim();
      state.userName = nameInput.value.trim();
      goPhoto();
    }
  }, 'Iniziamo →');

  wrap.append(nameInput, keyInput, keyHint, btn);
  return wrap;
}

function renderPhoto() {
  const wrap = el('div', { class: 'bg-white rounded-2xl shadow-sm border border-stone-200 p-6 md:p-8 fade-in' });
  wrap.appendChild(el('h2', { class: 'display text-2xl mb-2', text: `Ciao${state.userName ? ' ' + state.userName : ''}, partiamo dalla tua foto.` }));
  wrap.appendChild(el('p', { class: 'text-sm text-stone-600 mb-6', text: 'Un primo piano o mezzo busto, luce naturale se possibile, senza occhiali da sole. Viene usata solo qui, sul tuo browser.' }));

  const input = el('input', { type: 'file', accept: 'image/*', class: 'hidden' });
  input.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const { dataUrl, base64, mime } = await compressImage(file);
      setState({ photoBase64: base64, photoDataUrl: dataUrl, photoMime: mime });
    } catch (err) {
      setState({ error: 'Non riesco a leggere la foto. Prova con un altro formato.' });
    }
  });

  const dropzone = el('label', {
    class: 'block border-2 border-dashed border-stone-300 rounded-xl p-8 text-center cursor-pointer hover:border-stone-500 transition'
  });
  if (state.photoDataUrl) {
    dropzone.appendChild(el('img', { src: state.photoDataUrl, class: 'mx-auto max-h-72 rounded-lg mb-3' }));
    dropzone.appendChild(el('p', { class: 'text-sm text-stone-600', text: 'Clicca per cambiare foto' }));
  } else {
    dropzone.appendChild(el('div', { class: 'text-stone-400 text-6xl mb-3 display', text: '+' }));
    dropzone.appendChild(el('p', { class: 'text-sm text-stone-600', text: 'Clicca o trascina qui la foto' }));
  }
  dropzone.appendChild(input);
  dropzone.addEventListener('dragover', e => e.preventDefault());
  dropzone.addEventListener('drop', async (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (!file) return;
    try {
      const { dataUrl, base64, mime } = await compressImage(file);
      setState({ photoBase64: base64, photoDataUrl: dataUrl, photoMime: mime });
    } catch (err) { setState({ error: 'Non riesco a leggere la foto.' }); }
  });

  const btn = el('button', {
    class: `mt-6 w-full py-3 rounded-lg font-medium transition ${state.photoBase64 ? 'bg-stone-900 text-white hover:bg-stone-800' : 'bg-stone-200 text-stone-400 cursor-not-allowed'}`,
    onclick: () => state.photoBase64 && runVisionAnalysis()
  }, state.photoBase64 ? 'Analizza la foto →' : 'Prima carica una foto');
  if (!state.photoBase64) btn.disabled = true;

  wrap.append(dropzone, btn);
  return wrap;
}

function renderAnalyzing() {
  const wrap = el('div', { class: 'bg-white rounded-2xl shadow-sm border border-stone-200 p-8 text-center fade-in' });
  wrap.appendChild(el('div', { class: 'inline-block w-10 h-10 border-2 border-stone-300 border-t-stone-900 rounded-full spinner mb-4' }));
  wrap.appendChild(el('p', { class: 'display text-xl text-stone-800', text: 'Sto guardando la tua foto...' }));
  wrap.appendChild(el('p', { class: 'text-sm text-stone-500 mt-2', text: 'Rilevo forma viso, lineamenti, carnagione, capelli attuali.' }));
  return wrap;
}

function renderInterview() {
  const wrap = el('div', { class: 'bg-white rounded-2xl shadow-sm border border-stone-200 p-6 md:p-8 fade-in' });
  wrap.appendChild(el('h2', { class: 'display text-2xl mb-2', text: 'Cinque domande veloci.' }));
  wrap.appendChild(el('p', { class: 'text-sm text-stone-600 mb-6', text: 'Poi Nayla ti farà altre domande su misura, basate sulle tue risposte.' }));

  const questions = [
    { key: 'occasione', label: '1. Occasione', hint: 'Cambio quotidiano o un evento specifico? (Racconta pure)', placeholder: 'Es. Rinnovo generale / matrimonio di un amico a giugno / nuovo lavoro...' },
    { key: 'attuale', label: '2. Il tuo look adesso', hint: 'Cosa ti piace e cosa vuoi trasformare?', placeholder: 'Es. Mi piacciono i miei capelli ma il taglio mi stanca, il trucco è sempre uguale...' },
    { key: 'mood', label: '3. Come vuoi sentirti', hint: '2-3 aggettivi (elegante, audace, naturale, magnetica, rilassata, raffinata, energica, dolce, autorevole, sofisticata, fresca, sensuale...)', placeholder: 'Es. raffinata e un po\' audace' },
    { key: 'vincoli', label: '4. Assolutamente NO', hint: 'Cosa non vuoi vedere proprio?', placeholder: 'Es. niente nero corvino, niente frange, niente rossetto rosso pieno' },
    { key: 'tempo', label: '5. Tempo mattutino', hint: 'Quanto tempo dedichi a messa in piega + trucco?', placeholder: 'Es. 10 minuti, non di più' }
  ];

  questions.forEach(q => {
    const wrapQ = el('div', { class: 'mb-5' });
    wrapQ.appendChild(el('label', { class: 'block text-sm font-medium text-stone-800 mb-1', text: q.label }));
    wrapQ.appendChild(el('p', { class: 'text-xs text-stone-500 mb-2', text: q.hint }));
    const ta = el('textarea', {
      class: 'w-full px-3 py-2 rounded-lg border border-stone-300 text-sm focus:outline-none focus:border-stone-900 min-h-[60px]',
      placeholder: q.placeholder,
      rows: 2
    });
    ta.value = state.initialAnswers[q.key];
    ta.addEventListener('input', e => { state.initialAnswers[q.key] = e.target.value; });
    wrapQ.appendChild(ta);
    wrap.appendChild(wrapQ);
  });

  const allFilled = () => Object.values(state.initialAnswers).every(v => v.trim().length > 0);

  const btn = el('button', {
    class: 'mt-4 w-full py-3 rounded-lg bg-stone-900 text-white font-medium hover:bg-stone-800 transition',
    onclick: () => {
      if (!allFilled()) { setState({ error: 'Rispondi a tutte e 5, anche con una frase breve.' }); return; }
      startDialogue();
    }
  }, 'Passiamo al dialogo con Nayla →');
  wrap.appendChild(btn);
  return wrap;
}

function renderDialogue() {
  const wrap = el('div', { class: 'bg-white rounded-2xl shadow-sm border border-stone-200 p-6 md:p-8 fade-in flex flex-col' });
  wrap.appendChild(el('div', { class: 'flex items-center justify-between mb-4' }, [
    el('h2', { class: 'display text-2xl', text: 'Dialogo con Nayla' }),
    el('span', { class: 'text-xs text-stone-500', text: `turno ${state.dialogueTurn}/${state.MAX_TURNS}` })
  ]));

  const chat = el('div', { class: 'chat-scroll flex-1 overflow-y-auto max-h-[55vh] pr-2 mb-4 space-y-3' });
  state.conversation.forEach(m => {
    const bubble = el('div', {
      class: m.role === 'assistant'
        ? 'max-w-[85%] bg-stone-100 text-stone-900 rounded-2xl rounded-tl-sm px-4 py-3 text-sm'
        : 'max-w-[85%] bg-stone-900 text-white rounded-2xl rounded-tr-sm px-4 py-3 text-sm ml-auto'
    }, m.content);
    chat.appendChild(el('div', { class: m.role === 'user' ? 'flex justify-end' : 'flex' }, bubble));
  });
  if (state.isLoading) {
    chat.appendChild(el('div', { class: 'flex' }, el('div', { class: 'max-w-[85%] bg-stone-100 rounded-2xl rounded-tl-sm px-4 py-3 text-sm dots' }, [
      el('span', { text: '·' }), el('span', { text: '·' }), el('span', { text: '·' })
    ])));
  }
  wrap.appendChild(chat);

  if (!state.isLoading && state.conversation.length && state.conversation[state.conversation.length - 1].role === 'assistant') {
    const ta = el('textarea', {
      class: 'w-full px-3 py-3 rounded-lg border border-stone-300 text-sm focus:outline-none focus:border-stone-900 min-h-[70px] mb-2',
      placeholder: 'Rispondi qui...',
      rows: 2
    });
    ta.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); send(); }
    });
    const send = () => { const t = ta.value; ta.value = ''; userReply(t); };
    const btn = el('button', {
      class: 'w-full py-2 rounded-lg bg-stone-900 text-white text-sm font-medium hover:bg-stone-800 transition',
      onclick: send
    }, 'Invia (⌘+Enter)');
    wrap.append(ta, btn);

    if (state.dialogueTurn >= state.MIN_TURNS) {
      wrap.appendChild(el('button', {
        class: 'mt-3 w-full py-2 rounded-lg border-2 border-stone-900 text-stone-900 text-sm font-medium hover:bg-stone-900 hover:text-white transition',
        onclick: () => {
          state.conversation.push({ role: 'user', content: '[sistema: ho dato abbastanza informazioni, proponimi i look ADESSO, action=propose con 2-3 looks]' });
          dialogueStep();
        }
      }, '✨ Proponi ora i look (basta domande)'));
    }
  }
  return wrap;
}

function renderGenerating() {
  const wrap = el('div', { class: 'bg-white rounded-2xl shadow-sm border border-stone-200 p-8 fade-in' });
  wrap.appendChild(el('div', { class: 'flex items-center gap-3 mb-4' }, [
    el('div', { class: 'w-5 h-5 border-2 border-stone-300 border-t-stone-900 rounded-full spinner' }),
    el('h2', { class: 'display text-xl', text: 'Sto disegnando i tuoi look...' })
  ]));
  const list = el('div', { class: 'space-y-2' });
  state.looks.forEach((look, i) => {
    const done = state.generatedImages[i];
    const status = done ? (done.error ? '✕' : '✓') : '…';
    const color = done ? (done.error ? 'text-rose-500' : 'text-emerald-600') : 'text-stone-400';
    list.appendChild(el('div', { class: 'flex items-center gap-3 text-sm' }, [
      el('span', { class: `${color} font-mono`, text: status }),
      el('span', { text: look.title })
    ]));
  });
  wrap.appendChild(list);
  wrap.appendChild(el('p', { class: 'text-xs text-stone-500 mt-4', text: 'Può richiedere 30-60 secondi per look.' }));
  return wrap;
}

function renderResults() {
  const container = el('div', { class: 'space-y-6 fade-in' });

  const toolbar = el('div', { class: 'flex items-center justify-between no-print flex-wrap gap-2' }, [
    el('h2', { class: 'display text-2xl', text: 'Ecco i tuoi look' }),
    el('div', { class: 'flex gap-2 flex-wrap' }, [
      el('button', {
        class: 'px-3 py-2 text-sm rounded-lg border border-stone-300 hover:bg-stone-100',
        onclick: () => { state.generatedImages = {}; generateAllImages(); }
      }, '↻ Rigenera immagini'),
      el('button', {
        class: 'px-3 py-2 text-sm rounded-lg border border-stone-300 hover:bg-stone-100',
        onclick: () => window.print()
      }, '🖨 Stampa scheda'),
      el('button', {
        class: 'px-3 py-2 text-sm rounded-lg border border-stone-300 hover:bg-stone-100',
        onclick: resetAll
      }, '↻ Nuovo look')
    ])
  ]);
  container.appendChild(toolbar);

  if (state.intro) container.appendChild(el('p', { class: 'text-stone-700 italic', text: state.intro }));

  state.looks.forEach((look, i) => {
    const img = state.generatedImages[i];
    const card = el('div', { class: 'look-card bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden' });

    const grid = el('div', { class: 'grid md:grid-cols-2' });
    const imgCol = el('div', { class: 'bg-stone-100 p-4 flex flex-col gap-3 items-center justify-center' });
    imgCol.appendChild(el('p', { class: 'text-[10px] tracking-[0.2em] uppercase text-stone-500', text: 'Prima → Dopo' }));
    const pair = el('div', { class: 'flex gap-3 w-full justify-center' });
    pair.appendChild(el('img', { src: state.photoDataUrl, class: 'w-1/2 max-w-[160px] rounded-lg object-cover' }));
    if (typeof img === 'string') {
      pair.appendChild(el('img', { src: img, class: 'w-1/2 max-w-[160px] rounded-lg object-cover' }));
    } else if (img && img.error) {
      const errBox = el('div', { class: 'w-1/2 max-w-[160px] aspect-square rounded-lg bg-rose-50 border border-rose-200 p-2 text-[10px] text-rose-700 flex flex-col justify-between' });
      errBox.appendChild(el('div', { text: img.error.slice(0, 120) }));
      errBox.appendChild(el('button', {
        class: 'mt-1 text-xs underline text-rose-800',
        onclick: async () => {
          delete state.generatedImages[i]; render();
          try {
            const newImg = await nanoBananaEdit(look.image_prompt, state.photoBase64, state.photoMime);
            state.generatedImages[i] = newImg;
          } catch (e) {
            state.generatedImages[i] = { error: e.message };
          }
          render();
        }
      }, '↻ Riprova'));
      pair.appendChild(errBox);
    } else {
      pair.appendChild(el('div', { class: 'w-1/2 max-w-[160px] aspect-square rounded-lg bg-stone-200 animate-pulse' }));
    }
    imgCol.appendChild(pair);
    if (typeof img === 'string') {
      imgCol.appendChild(el('a', {
        href: img, download: `look-${i + 1}-${(look.title || '').replace(/\s+/g, '-').toLowerCase()}.png`,
        class: 'text-xs underline text-stone-600 no-print'
      }, '⬇ scarica immagine'));
    }
    grid.appendChild(imgCol);

    const txt = el('div', { class: 'p-5 md:p-6 space-y-3' });
    txt.appendChild(el('div', {}, [
      el('p', { class: 'text-[10px] tracking-[0.2em] uppercase text-stone-400', text: `Proposta ${i + 1}` }),
      el('h3', { class: 'display text-2xl text-stone-900', text: look.title || '—' }),
      el('p', { class: 'text-sm italic text-stone-600 mt-1', text: look.vibe || '' })
    ]));

    const field = (label, value) => {
      const row = el('div', {});
      row.appendChild(el('p', { class: 'text-[10px] uppercase tracking-wider text-stone-500', text: label }));
      row.appendChild(el('p', { class: 'text-sm text-stone-800', text: value || '—' }));
      return row;
    };
    const hair = look.hair || {};
    const makeup = look.makeup || {};
    const grid2 = el('div', { class: 'grid grid-cols-2 gap-3 pt-2 border-t border-stone-100' });
    grid2.append(
      field('Taglio', hair.taglio),
      field('Colore capelli', hair.colore),
      field('Styling', hair.styling),
      field('Base trucco', makeup.base),
      field('Occhi', makeup.occhi),
      field('Sopracciglia', makeup.sopracciglia),
      field('Rossetto', look.lipstick),
      field('Orecchini', look.earrings)
    );
    txt.appendChild(grid2);

    if (look.perche_ti_sta) {
      txt.appendChild(el('div', { class: 'pt-2 border-t border-stone-100' }, [
        el('p', { class: 'text-[10px] uppercase tracking-wider text-stone-500 mb-1', text: 'Perché ti sta' }),
        el('p', { class: 'text-sm text-stone-700 italic', text: look.perche_ti_sta })
      ]));
    }

    grid.appendChild(txt);
    card.appendChild(grid);
    container.appendChild(card);
  });

  container.appendChild(el('p', { class: 'text-xs text-stone-400 text-center pt-4 no-print', text: 'v0.1.1 · Gemini 2.5 Pro (dialogo) + Gemini 2.5 Flash (vision) + Nano Banana (immagini)' }));
  return container;
}

/* =============================================================
   BOOT
   ============================================================= */
if (state.geminiApiKey) state.step = 'photo';
render();
</script>
