<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">

<title>Il tuo consulente d'immagine · v0.2</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body class="bg-stone-50 min-h-screen text-stone-900">
<div id="app" class="max-w-3xl mx-auto px-4 py-8 md:py-12"></div>
<div id="footer" class="max-w-3xl mx-auto px-4 pb-6 text-xs text-stone-400 no-print"></div>

<script>
/* =============================================================
   FALLBACK RECIPE (embedded, se fetch fallisce)
   ============================================================= */
const FALLBACK_RECIPE = `# RECIPE fallback
Output: 2-3 look completi (capelli, trucco, rossetto, orecchini). Preserva sempre l'identità del volto. Dialogo veloce. Intervista minima: 3 domande (occasione, aggettivi, vincoli NO). Ogni image_prompt in inglese, vincolato a preservare identità. Checklist avversariale a 7 punti (V1-V7). Log errori in localStorage.`;

/* =============================================================
   STATE
   ============================================================= */
// Migrazione automatica da v0.1
(function migrateFromV1() {
  if (!localStorage.getItem('ci2_gemini_key') && localStorage.getItem('ci_gemini_key')) {
    localStorage.setItem('ci2_gemini_key', localStorage.getItem('ci_gemini_key'));
  }
  if (!localStorage.getItem('ci2_user_name') && localStorage.getItem('ci_user_name')) {
    localStorage.setItem('ci2_user_name', localStorage.getItem('ci_user_name'));
  }
})();

const state = {
  step: 'setup',
  keys: {
    gemini: localStorage.getItem('ci2_gemini_key') || '',
    anthropic: localStorage.getItem('ci2_anthropic_key') || ''
  },
  userName: localStorage.getItem('ci2_user_name') || '',
  mode: localStorage.getItem('ci2_mode') || 'fast', // fast | quality
  dialogueMode: localStorage.getItem('ci2_dialogue_mode') || 'express', // express | deep
  recipe: null,
  photo: { base64: null, dataUrl: null, mime: 'image/jpeg' },
  faceAnalysis: null,
  preferences: { occasione: '', aggettivi: '', vincoli_no: '', ulteriori_note_dialogo: '' },
  dialogue: [],
  dialogueTurn: 0,
  MAX_ADAPTIVE: 3,
  imagePrompts: null,
  verdicts: null,
  correctionIterations: {},
  MAX_CORRECTION_ITER: 2,
  generatedImages: {},
  errorLog: JSON.parse(localStorage.getItem('ci2_error_log') || '[]'),
  isLoading: false,
  loadingMessage: '',
  error: null,
  sessionCostCents: 0,
  showTechDetails: false
};

const setState = (patch) => { Object.assign(state, patch); render(); };

/* =============================================================
   UTIL
   ============================================================= */
const el = (tag, attrs = {}, children = []) => {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') node.className = v;
    else if (k === 'html') node.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'text') node.textContent = v;
    else node.setAttribute(k, v);
  }
  for (const c of [].concat(children)) if (c) node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  return node;
};

const compressImage = (file, maxSide = 1280, quality = 0.88) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', quality);
      resolve({ dataUrl, base64: dataUrl.split(',')[1], mime: 'image/jpeg' });
    };
    img.onerror = reject;
    img.src = reader.result;
  };
  reader.onerror = reject;
  reader.readAsDataURL(file);
});

const extractJson = (text) => {
  if (!text) return null;
  const stripped = text.replace(/```(?:json)?\s*|\s*```/g, '').trim();
  try { return JSON.parse(stripped); } catch {}
  const match = stripped.match(/\{[\s\S]*\}/);
  if (match) { try { return JSON.parse(match[0]); } catch {} }
  return null;
};

function logError(stage, severity, message, context = {}, recovered = false) {
  const entry = { ts: new Date().toISOString(), stage, severity, message, context, recovered };
  state.errorLog.push(entry);
  try { localStorage.setItem('ci2_error_log', JSON.stringify(state.errorLog.slice(-200))); } catch {}
  console[severity === 'error' ? 'error' : 'log']('[ci2]', entry);
}

function trackCost(cents) {
  state.sessionCostCents += cents;
  const footer = document.getElementById('footer');
  if (footer) renderFooter();
}

/* =============================================================
   API CALLS — Gemini
   ============================================================= */
const GEMINI = 'https://generativelanguage.googleapis.com/v1beta/models';

async function geminiCall(model, parts, opts = {}) {
  const body = {
    contents: [{ role: 'user', parts }],
    generationConfig: {
      temperature: opts.temperature ?? 0.6,
      maxOutputTokens: opts.maxTokens ?? 3500,
      ...(opts.json ? { responseMimeType: 'application/json' } : {}),
      ...(opts.schema ? { responseSchema: opts.schema } : {}),
      ...(opts.modalities ? { responseModalities: opts.modalities } : {})
    }
  };
  const res = await fetch(`${GEMINI}/${model}:generateContent?key=${state.keys.gemini}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`Gemini ${model} ${res.status}: ${txt.slice(0, 300)}`);
  }
  const data = await res.json();
  trackCost(model.includes('pro') ? 0.5 : 0.1);
  return { data, parts: data?.candidates?.[0]?.content?.parts || [] };
}

async function geminiText(model, prompt, opts = {}) {
  const { parts } = await geminiCall(model, [{ text: prompt }], opts);
  return parts.map(p => p.text).filter(Boolean).join('\n');
}

async function geminiVision(prompt, base64, mime = 'image/jpeg', opts = {}) {
  const parts = [{ text: prompt }, { inlineData: { mimeType: mime, data: base64 } }];
  const { parts: out } = await geminiCall('gemini-2.5-flash', parts, opts);
  return out.map(p => p.text).filter(Boolean).join('\n');
}

async function nanoBanana(promptText, base64, mime = 'image/jpeg') {
  const candidates = ['gemini-2.5-flash-image', 'gemini-2.5-flash-image-preview'];
  let lastErr = null;
  for (const model of candidates) {
    try {
      const parts = [{ text: promptText }, { inlineData: { mimeType: mime, data: base64 } }];
      const { parts: out } = await geminiCall(model, parts, { modalities: ['TEXT', 'IMAGE'], maxTokens: 8000 });
      trackCost(3);
      for (const p of out) {
        const inline = p.inlineData || p.inline_data;
        if (inline?.data) {
          const mt = inline.mimeType || inline.mime_type || 'image/png';
          return `data:${mt};base64,${inline.data}`;
        }
      }
      lastErr = new Error(`${model}: nessuna immagine nella risposta`);
    } catch (e) { lastErr = e; logError('images', 'warn', `${model} failed`, { error: e.message }, true); }
  }
  throw lastErr || new Error('Nano Banana: errore sconosciuto');
}

/* =============================================================
   API CALLS — Anthropic (via direct browser access)
   ============================================================= */
async function anthropicCall(messages, opts = {}) {
  if (!state.keys.anthropic) throw new Error('NO_ANTHROPIC_KEY');
  const model = opts.model || (state.mode === 'quality' ? 'claude-opus-4-7' : 'claude-haiku-4-5-20251001');
  const body = {
    model,
    max_tokens: opts.maxTokens || 3000,
    messages,
    ...(opts.system ? { system: opts.system } : {})
  };
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'x-api-key': state.keys.anthropic,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`Anthropic ${model} ${res.status}: ${txt.slice(0, 300)}`);
  }
  const data = await res.json();
  trackCost(model.includes('opus') ? 2 : 0.3);
  const text = (data?.content || []).filter(p => p.type === 'text').map(p => p.text).join('\n');
  return text;
}

/**
 * Entry point unificato per step "intelligenti": preferisci Anthropic se disponibile, altrimenti Gemini Pro.
 */
async function smartReason(system, user, opts = {}) {
  if (state.keys.anthropic) {
    try {
      return await anthropicCall([{ role: 'user', content: user }], { system, ...opts });
    } catch (e) {
      logError(opts.stage || 'smart', 'warn', `Anthropic failed, fallback Gemini`, { error: e.message }, true);
    }
  }
  const combined = `${system}\n\n---\n\n${user}`;
  return await geminiText('gemini-2.5-pro', combined, { json: true, maxTokens: opts.maxTokens || 3000 });
}

/* =============================================================
   SCHEMA — Gemini structured output
   ============================================================= */
const PROMPTS_SCHEMA = {
  type: 'object',
  properties: {
    intro: { type: 'string' },
    looks: {
      type: 'array',
      items: {
        type: 'object',
        properties: {
          title: { type: 'string' },
          vibe: { type: 'string' },
          hair: {
            type: 'object',
            properties: {
              taglio: { type: 'string' },
              colore: { type: 'string' },
              styling: { type: 'string' }
            }
          },
          makeup: {
            type: 'object',
            properties: {
              base: { type: 'string' },
              occhi: { type: 'string' },
              sopracciglia: { type: 'string' }
            }
          },
          lipstick: { type: 'string' },
          earrings: { type: 'string' },
          perche_ti_sta: { type: 'string' },
          english_prompt: { type: 'string' }
        }
      }
    }
  }
};

const DIALOGUE_SCHEMA = {
  type: 'object',
  properties: {
    action: { type: 'string', enum: ['ask', 'done'] },
    question: { type: 'string' },
    summary: { type: 'string' }
  },
  required: ['action']
};

/* =============================================================
   STEP 0 — RECIPE
   ============================================================= */
async function loadRecipe() {
  try {
    const res = await fetch('./RECIPE.md');
    if (res.ok) {
      state.recipe = await res.text();
      logError('recipe', 'info', 'RECIPE.md caricata da file', { size: state.recipe.length });
      return;
    }
  } catch (e) { /* fall through */ }
  state.recipe = FALLBACK_RECIPE;
  logError('recipe', 'warn', 'fetch RECIPE.md fallito, uso FALLBACK_RECIPE', {}, true);
}

/* =============================================================
   STEP 1 — VISION
   ============================================================= */
const VISION_PROMPT = (recipe) => `Sei un consulente d'immagine. Analizza la foto con occhio professionale, sintetizza in JSON valido. NON giudizi estetici, solo osservazioni fattuali.

RECIPE di riferimento:
${recipe}

Rispondi SOLO con JSON:
{
  "forma_viso": "ovale|tondo|squadrato|cuore|lungo|diamante",
  "lineamenti": "descrizione sintetica zigomi, mento, fronte",
  "carnagione": "chiara|medio-chiara|media|olivastra|scura + undertone fredda|calda|neutra",
  "occhi": { "colore": "...", "forma": "..." },
  "sopracciglia": "colore, spessore, forma",
  "capelli_attuali": { "lunghezza": "...", "texture": "lisci|mossi|ricci|afro", "colore": "...", "volume": "..." },
  "trucco_visibile": "nessuno|naturale|marcato + dettagli",
  "accessori_visibili": "nessuno|descrizione",
  "note": "dettagli utili"
}`;

async function runVision() {
  setState({ step: 'analyzing', loadingMessage: 'Nayla sta guardando la tua foto...', error: null });
  try {
    const raw = await geminiVision(VISION_PROMPT(state.recipe), state.photo.base64, state.photo.mime, { json: true, maxTokens: 1000 });
    const json = extractJson(raw) || { raw };
    state.faceAnalysis = json;
    logError('vision', 'info', 'analisi foto completata', { fields: Object.keys(json).length });
    setState({ step: 'interview' });
  } catch (e) {
    logError('vision', 'error', e.message, {}, false);
    setState({ error: `Analisi foto fallita: ${e.message}`, step: 'photo' });
  }
}

/* =============================================================
   STEP 2 — INTERVIEW
   ============================================================= */
async function runDialogueTurn(retry = 0) {
  const system = `Sei "Nayla", consulente d'immagine italiana, calda e concreta. Stai parlando con ${state.userName || 'la tua cliente'}.

${state.recipe}

Analisi foto:
${JSON.stringify(state.faceAnalysis, null, 2)}

Risposte iniziali:
${JSON.stringify(state.preferences, null, 2)}

Dialogo finora:
${state.dialogue.map(m => `${m.role === 'user' ? 'LEI' : 'TU'}: ${m.content}`).join('\n') || '(vuoto)'}

Sei al turno adattivo ${state.dialogueTurn + 1}/${state.MAX_ADAPTIVE}.

Decidi:
- action=ask: fai UNA domanda concreta, una sola frase, calda. Solo se ti manca davvero un'informazione che cambia i look.
- action=done: dichiari di aver abbastanza info, generi un "summary" italiano di 1-2 frasi che riassume le preferenze emerse dal dialogo adattivo.

IMPORTANTE: rispondi ESCLUSIVAMENTE con un oggetto JSON valido. Nessun testo prima o dopo. Nessun markdown. Nessun backtick. Formati validi:
{"action":"ask","question":"testo della domanda"}
{"action":"done","summary":"riassunto di 1-2 frasi"}`;

  const raw = await geminiText(state.mode === 'quality' ? 'gemini-2.5-pro' : 'gemini-2.5-flash',
    system, { json: true, schema: DIALOGUE_SCHEMA, maxTokens: 600, temperature: retry === 0 ? 0.6 : 0.2 });
  const json = extractJson(raw);
  if (!json || !json.action) {
    logError('interview', 'warn', 'JSON non parsabile', { raw: (raw || '').slice(0, 300), retry }, retry < 1);
    if (retry < 1) return runDialogueTurn(retry + 1);
  }
  return json;
}

async function dialogueStep() {
  state.isLoading = true; state.loadingMessage = 'Nayla sta pensando...'; render();
  try {
    const json = await runDialogueTurn();
    state.isLoading = false;
    if (json?.action === 'ask' && json.question) {
      state.dialogue.push({ role: 'assistant', content: json.question });
      state.dialogueTurn += 1;
      render();
    } else if (json?.action === 'done' || state.dialogueTurn >= state.MAX_ADAPTIVE) {
      if (json?.summary) state.preferences.ulteriori_note_dialogo = json.summary;
      await generatePrompts();
    } else {
      // Graceful fallback: saltiamo al propose invece di bloccare l'utente
      logError('interview', 'warn', 'Dialogo adattivo non interpretabile, salto ai look', {}, true);
      state.preferences.ulteriori_note_dialogo = state.dialogue.filter(m => m.role === 'user').map(m => m.content).join(' | ') || '(nessuna nota aggiuntiva)';
      await generatePrompts();
    }
  } catch (e) {
    state.isLoading = false;
    logError('interview', 'error', e.message, {}, false);
    // fallback più aggressivo: procedi comunque
    state.preferences.ulteriori_note_dialogo = state.dialogue.filter(m => m.role === 'user').map(m => m.content).join(' | ') || '(nessuna nota aggiuntiva)';
    await generatePrompts();
  }
}

async function userReply(text) {
  if (!text.trim()) return;
  state.dialogue.push({ role: 'user', content: text.trim() });
  render();
  await dialogueStep();
}

/* =============================================================
   STEP 3 — PROMPT GENERATOR
   ============================================================= */
async function generatePrompts() {
  setState({ step: 'generating_prompts', loadingMessage: 'Nayla sta costruendo le proposte...', error: null });

  const system = `Sei "Nayla", consulente d'immagine italiana senior. Genera ESATTAMENTE 3 proposte di look diverse tra loro (una più sicura, una più sperimentale, una di contrasto), complete di tutti i campi.

${state.recipe}

Analisi foto:
${JSON.stringify(state.faceAnalysis, null, 2)}

Preferenze utente:
${JSON.stringify(state.preferences, null, 2)}

OBBLIGO per english_prompt: deve iniziare con "Photorealistic portrait. Preserve subject identity exactly: face shape, skin tone, eye color, eye shape, nose, mouth unchanged." Poi descrivi nel dettaglio hair, makeup, lipstick, earrings, lighting. Max 150 parole.

Rispondi SOLO con JSON:
{
  "intro": "1-2 frasi di presentazione",
  "looks": [
    {
      "title": "...",
      "vibe": "...",
      "hair": {"taglio": "...", "colore": "...", "styling": "..."},
      "makeup": {"base": "...", "occhi": "...", "sopracciglia": "..."},
      "lipstick": "...",
      "earrings": "...",
      "perche_ti_sta": "...",
      "english_prompt": "Photorealistic portrait. Preserve subject identity exactly: ..."
    },
    {...},
    {...}
  ]
}`;

  try {
    const raw = await geminiText('gemini-2.5-pro', system, { json: true, schema: PROMPTS_SCHEMA, maxTokens: 4000, temperature: 0.7 });
    const json = extractJson(raw);
    if (!json || !Array.isArray(json.looks) || json.looks.length === 0) throw new Error('Prompts non generati');
    state.imagePrompts = json.looks.slice(0, 3);
    state.intro = json.intro || '';
    logError('prompts', 'info', `Generati ${state.imagePrompts.length} prompt`, {});
    await runAdversarialCheck();
  } catch (e) {
    logError('prompts', 'error', e.message, {}, false);
    setState({ error: `Generazione prompt fallita: ${e.message}` });
  }
}

/* =============================================================
   STEP 4 — ADVERSARIAL CHECK
   ============================================================= */
async function runAdversarialCheck() {
  setState({ step: 'adversarial', loadingMessage: 'Opus sta verificando le proposte...', error: null });

  const system = `Sei un agente avversariale. Il tuo compito è verificare se ogni image_prompt rispetta 7 regole ferree derivate dalla RECIPE. Sei severo ma giusto. Per ogni check cita EVIDENZA TESTUALE dal prompt. Se non trovi evidenza → il check fallisce.

RECIPE (regole vincolanti):
${state.recipe}

DIALOGO UTENTE (riferimento per V2, V3, V4):
Preferenze iniziali: ${JSON.stringify(state.preferences)}
Dialogo adattivo: ${state.dialogue.map(m => `${m.role}: ${m.content}`).join(' | ') || '(nessuno)'}

PROMPT DA VERIFICARE:
${JSON.stringify(state.imagePrompts.map((p, i) => ({ index: i, title: p.title, english_prompt: p.english_prompt, hair: p.hair, makeup: p.makeup, lipstick: p.lipstick, earrings: p.earrings })), null, 2)}

CHECKLIST (per ciascuno dei 3 prompt):
- V1 preserve_identity: il prompt contiene clausola esplicita di preservazione del volto?
- V2 cites_dialogue: il prompt cita almeno 2 elementi concreti emersi dal dialogo (aggettivi, occasione, vincoli)?
- V3 respects_no: rispetta tutti i "NO" dichiarati dall'utente?
- V4 coherent_adjectives: coerente con gli aggettivi aspirazionali?
- V5 covers_all_4: specifica hair + makeup + lipstick + earrings?
- V6 no_invented: NON introduce elementi non discussi?
- V7 clean_english: inglese pulito, < 150 parole, implementabile?

Rispondi SOLO con JSON:
{
  "verdicts": [
    {
      "prompt_index": 0,
      "verdict": "pass" | "fail",
      "checks": {
        "V1_preserve_identity": {"pass": true, "evidence": "citazione testuale"},
        "V2_cites_dialogue": {"pass": true, "evidence": "..."},
        "V3_respects_no": {"pass": true, "evidence": "..."},
        "V4_coherent_adjectives": {"pass": true, "evidence": "..."},
        "V5_covers_all_4": {"pass": true, "evidence": "..."},
        "V6_no_invented": {"pass": true, "evidence": "..."},
        "V7_clean_english": {"pass": true, "evidence": "..."}
      },
      "fix_hint": "null se verdict=pass; se fail, istruzione SPECIFICA per correggere (solo cosa cambiare, non riscrivere tutto)"
    },
    ...
  ]
}`;

  try {
    const raw = await smartReason(system, 'Esegui la verifica adversariale ora.', { stage: 'adversarial', maxTokens: 4000 });
    const json = extractJson(raw);
    if (!json?.verdicts) throw new Error('Adversarial: output non interpretabile');
    state.verdicts = json.verdicts;
    const failing = json.verdicts.filter(v => v.verdict === 'fail');
    logError('adversarial', 'info', `${json.verdicts.length} verdetti, ${failing.length} fail`, {});
    if (failing.length === 0) {
      await generateAllImages();
    } else {
      await runCorrector(failing);
    }
  } catch (e) {
    logError('adversarial', 'warn', `Adversarial fallito, procedo senza check: ${e.message}`, {}, true);
    // graceful degradation
    await generateAllImages();
  }
}

/* =============================================================
   STEP 5 — CORRECTOR
   ============================================================= */
async function runCorrector(failingVerdicts) {
  setState({ step: 'correcting', loadingMessage: `Nayla sta rifinendo ${failingVerdicts.length} proposte...`, error: null });

  const toFix = failingVerdicts.filter(v => (state.correctionIterations[v.prompt_index] || 0) < state.MAX_CORRECTION_ITER);

  if (toFix.length === 0) {
    logError('correction', 'warn', 'Max iterazioni raggiunte, procedo con prompt originali', { indices: failingVerdicts.map(v => v.prompt_index) }, true);
    await generateAllImages();
    return;
  }

  const system = `Sei un agente di correzione. Ricevi 1 o più image_prompt flaggati come "fail" dall'adversarial check, con un fix_hint SPECIFICO per ciascuno. Il tuo compito: applicare MINIMAMENTE il fix_hint, SENZA stravolgere il prompt. Cambia solo ciò che serve.

RECIPE (regole vincolanti):
${state.recipe}

PROMPT DA CORREGGERE:
${JSON.stringify(toFix.map(v => ({ index: v.prompt_index, original: state.imagePrompts[v.prompt_index], fix_hint: v.fix_hint })), null, 2)}

Rispondi SOLO con JSON:
{
  "corrected": [
    {
      "index": 0,
      "english_prompt": "nuova versione con fix applicato",
      "title": "... (può essere lasciato uguale)",
      "hair": {...}, "makeup": {...}, "lipstick": "...", "earrings": "...",
      "vibe": "...", "perche_ti_sta": "..."
    },
    ...
  ]
}`;

  try {
    const raw = await smartReason(system, 'Correggi i prompt ora.', { stage: 'correction', maxTokens: 3000 });
    const json = extractJson(raw);
    if (!json?.corrected) throw new Error('Corrector: output non interpretabile');
    for (const c of json.corrected) {
      if (typeof c.index !== 'number') continue;
      state.correctionIterations[c.index] = (state.correctionIterations[c.index] || 0) + 1;
      state.imagePrompts[c.index] = { ...state.imagePrompts[c.index], ...c };
    }
    logError('correction', 'info', `Corretti ${json.corrected.length} prompt`, { indices: json.corrected.map(c => c.index) });
    await runAdversarialCheck();
  } catch (e) {
    logError('correction', 'warn', `Corrector fallito: ${e.message}, procedo`, {}, true);
    await generateAllImages();
  }
}

/* =============================================================
   STEP 6 — IMAGE GEN (parallel)
   ============================================================= */
async function generateAllImages() {
  setState({ step: 'generating', loadingMessage: 'Sto disegnando i tuoi look...', error: null });
  state.generatedImages = {};
  render();
  const tasks = state.imagePrompts.map((look, i) => generateOne(i, look));
  await Promise.all(tasks);
  setState({ step: 'results' });
}

async function generateOne(i, look, retry = 0) {
  try {
    const img = await nanoBanana(look.english_prompt, state.photo.base64, state.photo.mime);
    state.generatedImages[i] = img;
    logError('images', 'info', `Immagine ${i} generata`, {});
    render();
  } catch (e) {
    if (retry < 1) {
      logError('images', 'warn', `Retry immagine ${i}`, { error: e.message }, true);
      return generateOne(i, look, retry + 1);
    }
    logError('images', 'error', `Immagine ${i} fallita dopo retry`, { error: e.message }, false);
    state.generatedImages[i] = { error: e.message };
    render();
  }
}

function downloadLog() {
  const blob = new Blob([JSON.stringify(state.errorLog, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `consulente-immagine-log-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

    generating_prompts: renderLoading, adversarial: renderLoading,
    correcting: renderLoading, generating: renderGenerating,

    try {
      const r = await compressImage(file);
      state.photo = r;
      setState({});
    } catch (err) { setState({ error: 'Impossibile leggere la foto.' }); logError('photo', 'error', err.message, {}, false); }
  });

      el('p', { class: 'text-[10px] tracking-[0.2em] uppercase text-stone-400', text: `Proposta ${i + 1}${verdict ? ' · ' + (verdict.verdict === 'pass' ? '✓ verificata' : '△ approssimativa') : ''}` }),
      el('h3', { class: 'display text-2xl text-stone-900', text: look.title || '—' }),
      el('p', { class: 'text-sm italic text-stone-600 mt-1', text: look.vibe || '' })
    ]));

    const field = (label, value) => {
      const row = el('div', {});
      row.appendChild(el('p', { class: 'text-[10px] uppercase tracking-wider text-stone-500', text: label }));
      row.appendChild(el('p', { class: 'text-sm text-stone-800', text: value || '—' }));
      return row;
    };
    const hair = look.hair || {}, makeup = look.makeup || {};
    const grid2 = el('div', { class: 'grid grid-cols-2 gap-3 pt-2 border-t border-stone-100' });
    grid2.append(
      field('Taglio', hair.taglio), field('Colore capelli', hair.colore),
      field('Styling', hair.styling), field('Base trucco', makeup.base),
      field('Occhi', makeup.occhi), field('Sopracciglia', makeup.sopracciglia),
      field('Rossetto', look.lipstick), field('Orecchini', look.earrings)
    );
    txt.appendChild(grid2);

    if (look.perche_ti_sta) {
      txt.appendChild(el('div', { class: 'pt-2 border-t border-stone-100' }, [
        el('p', { class: 'text-[10px] uppercase tracking-wider text-stone-500 mb-1', text: 'Perché ti sta' }),
        el('p', { class: 'text-sm text-stone-700 italic', text: look.perche_ti_sta })
      ]));
    }

    if (verdict) {
      const details = el('details', { class: 'no-print pt-2 border-t border-stone-100' });
      details.appendChild(el('summary', { class: 'text-xs text-stone-500 underline cursor-pointer', text: 'Dettagli tecnici (checklist avversariale)' }));
      const checksDiv = el('div', { class: 'mt-2 space-y-1 text-xs text-stone-600' });
      Object.entries(verdict.checks || {}).forEach(([k, v]) => {
        checksDiv.appendChild(el('div', { text: `${v.pass ? '✓' : '✕'} ${k}${v.evidence ? ' — ' + v.evidence.slice(0, 80) : ''}` }));
      });
      if (verdict.fix_hint) checksDiv.appendChild(el('div', { class: 'text-amber-700 mt-1', text: 'fix hint: ' + verdict.fix_hint }));
      details.appendChild(checksDiv);
      txt.appendChild(details);
    }

    grid.appendChild(txt);
    card.appendChild(grid);
    container.appendChild(card);
  });

  if (state.errorLog.filter(e => e.severity === 'error').length > 0) {
    container.appendChild(el('div', { class: 'rounded-lg bg-amber-50 border border-amber-200 p-3 text-xs text-amber-800 no-print' }, [
      el('span', { text: 'Nota: in questa sessione ci sono stati errori. ' }),
      el('button', { class: 'underline font-medium', onclick: downloadLog }, 'Scarica log')
    ]));
  }

  container.appendChild(el('p', { class: 'text-xs text-stone-400 text-center pt-4 no-print', text: `v0.2 · modalità ${state.mode} · Gemini (vision + prompt gen) + ${state.keys.anthropic ? 'Claude' : 'Gemini Pro'} (adversarial) + Nano Banana` }));
  return container;
}

/* =============================================================
   BOOT
   ============================================================= */
(async () => {
  if (state.keys.gemini) {
    await loadRecipe();
    if (state.recipe) state.step = 'photo';
  }
  render();
})();
</script>
</body>
</html>
